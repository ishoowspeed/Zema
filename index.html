<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lena ❤ Kacper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital@0;1&display=swap');

  :root{
    --bg-deep:#150a13;
    --bg-mid:#33112e;
    --accent-rose:#ff5d8f;
    --accent-rose-soft:#ff8fab;
    --accent-gold:#ffd166;
    --text-cream:#fff2f0;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; }

  body{
    min-height:100vh;
    overflow:hidden;
    background: radial-gradient(ellipse at 50% 28%, var(--bg-mid) 0%, var(--bg-deep) 68%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Cormorant Garamond', serif;
    position:relative;
    cursor:pointer;
  }

  .hearts-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:1;
  }

  .heart-particle{
    position:absolute;
    bottom:-40px;
    opacity:0;
    animation: rise linear infinite;
  }

  @keyframes rise{
    0%   { transform: translateY(0) translateX(0) rotate(0deg) scale(var(--s,1)); opacity:0; }
    10%  { opacity: var(--o, .8); }
    90%  { opacity: var(--o, .8); }
    100% { transform: translateY(-115vh) translateX(var(--dx,20px)) rotate(360deg) scale(var(--s,1)); opacity:0; }
  }

  .content{
    position:relative;
    z-index:2;
    text-align:center;
    padding:2rem;
    animation: reveal 1.8s ease forwards;
  }

  @keyframes reveal{
    0%   { opacity:0; transform: translateY(24px) scale(.96); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }

  .name{
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size: clamp(2.3rem, 8vw, 5rem);
    color: var(--text-cream);
    text-shadow: 0 0 18px rgba(255,93,143,.55), 0 0 46px rgba(255,93,143,.25);
    line-height:1.15;
    white-space:nowrap;
  }

  .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.8rem;
    margin:.7rem 0;
  }

  .divider .line{
    width:40px;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  }

  .beating-heart{
    width:26px;
    height:26px;
    position:relative;
    animation: beat 1.15s ease-in-out infinite;
  }

  .beating-heart::before,
  .beating-heart::after{
    content:'';
    position:absolute;
    top:0;
    width:15px;
    height:23px;
    background: linear-gradient(160deg, var(--accent-rose), var(--accent-gold));
    border-radius:16px 16px 0 0;
    filter: drop-shadow(0 0 10px rgba(255,93,143,.7));
  }
  .beating-heart::before{ left:13px; transform: rotate(-45deg); transform-origin: 0 100%; }
  .beating-heart::after{  left:0;   transform: rotate(45deg);  transform-origin: 100% 100%; }

  @keyframes beat{
    0%,100%{ transform:scale(1); }
    25%{ transform:scale(1.15); }
    40%{ transform:scale(.95); }
    60%{ transform:scale(1.08); }
  }

  .hint{
    margin-top:2.4rem;
    font-size:.8rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color: rgba(255,242,240,.38);
  }

  @media (max-width: 420px){
    .name{ white-space:normal; }
  }

  @media (prefers-reduced-motion: reduce){
    .heart-particle, .content, .beating-heart{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="content">
    <div class="name">Lena Janków</div>
    <div class="divider">
      <span class="line"></span>
      <span class="beating-heart"></span>
      <span class="line"></span>
    </div>
    <div class="name">Kacper Lipka</div>
    <div class="hint">kliknij, żeby dodać serduszko</div>
  </div>

<script>
  const bg = document.getElementById('heartsBg');
  const palette = ['#ff5d8f', '#ff8fab', '#ffd166', '#ffb3c6'];
  const heartPath = 'M16 29 2.7 16.6C-2 12.2.6 3.6 7.9 2.4 11.6 1.8 14.7 3.5 16 6.6 17.3 3.5 20.4 1.8 24.1 2.4c7.3 1.2 9.9 9.8 5.2 14.2z';

  function spawnAmbientHeart(){
    const size = 14 + Math.random() * 20;
    const color = palette[Math.floor(Math.random() * palette.length)];
    const d = document.createElement('div');
    d.className = 'heart-particle';
    d.style.left = Math.random() * 100 + '%';
    d.style.setProperty('--s', (0.5 + Math.random() * 1.1).toFixed(2));
    d.style.setProperty('--o', (0.35 + Math.random() * 0.45).toFixed(2));
    d.style.setProperty('--dx', (Math.random() * 80 - 40) + 'px');
    d.style.animationDuration = (6 + Math.random() * 7) + 's';
    d.style.animationDelay = (Math.random() * 8) + 's';
    d.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 32 29"><path fill="${color}" d="${heartPath}"/></svg>`;
    bg.appendChild(d);
  }

  for (let i = 0; i < 26; i++) spawnAmbientHeart();

  document.body.addEventListener('click', (e) => {
    for (let i = 0; i < 6; i++) {
      const size = 10 + Math.random() * 14;
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 60;
      const color = palette[Math.floor(Math.random() * palette.length)];

      const h = document.createElement('div');
      h.style.position = 'fixed';
      h.style.left = e.clientX + 'px';
      h.style.top = e.clientY + 'px';
      h.style.pointerEvents = 'none';
      h.style.zIndex = 5;
      h.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 32 29"><path fill="${color}" d="${heartPath}"/></svg>`;
      document.body.appendChild(h);

      h.animate([
        { transform: 'translate(-50%,-50%) translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist - 30}px) scale(0.3)`, opacity: 0 }
      ], { duration: 900 + Math.random() * 400, easing: 'cubic-bezier(.2,.7,.3,1)' });

      setTimeout(() => h.remove(), 1400);
    }
  });
</script>
</body>
</html>
