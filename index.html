<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DESTROY EARTH</title>
<style>
html,body{margin:0;overflow:hidden;background:black;touch-action:none;font-family:Arial}
#hud{
  position:fixed;top:10px;left:10px;z-index:10;color:#0ff;
  background:rgba(0,0,0,.5);padding:10px;border-radius:8px
}
button{
  display:block;margin:6px 0;padding:6px 10px;
  background:#111;color:#0ff;border:1px solid #0ff;border-radius:6px
}
#hp{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  width:80%;height:14px;background:#300;border-radius:10px;overflow:hidden
}
#hp div{height:100%;width:100%;background:linear-gradient(90deg,#f00,#ff0)}
</style>
</head>
<body>

<div id="hud">
  <b>☀️ WEAPON</b>
  <button onclick="weapon='meteor'">☄️ Meteor</button>
  <button onclick="weapon='laser'">🔴 Laser</button>
  <button onclick="weapon='plasma'">⚡ Plasma</button>
</div>
<div id="hp"><div id="hpbar"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
let weapon="meteor"
let earthHP=100

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,2000)
camera.position.z=6

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

/* 🌌 STARS */
const sg=new THREE.BufferGeometry(),sp=[]
for(let i=0;i<4000;i++)sp.push((Math.random()-.5)*1200,(Math.random()-.5)*1200,(Math.random()-.5)*1200)
sg.setAttribute("position",new THREE.Float32BufferAttribute(sp,3))
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.7})))

/* 🌍 EARTH */
const tex=new THREE.TextureLoader()
const earthMat=new THREE.MeshStandardMaterial({
  map:tex.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"),
  emissive:0x000000
})
const earth=new THREE.Mesh(new THREE.SphereGeometry(1,96,96),earthMat)
earth.rotation.z=THREE.MathUtils.degToRad(23.44)
scene.add(earth)

/* ☁️ CLOUDS */
const clouds=new THREE.Mesh(
  new THREE.SphereGeometry(1.02,64,64),
  new THREE.MeshStandardMaterial({
    map:tex.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),
    transparent:true,opacity:.8
  })
)
scene.add(clouds)

/* ☀️ SUN */
const sun=new THREE.PointLight(0xffffff,2,100)
sun.position.set(5,0,5)
scene.add(sun)
scene.add(new THREE.AmbientLight(0x222222))

/* ☄️ METEORS */
const meteors=[]
function spawnMeteor(){
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(.12,16,16),
    new THREE.MeshStandardMaterial({color:0xff5500,emissive:0xff2200})
  )
  m.position.set((Math.random()-.5)*10,Math.random()*6+4,(Math.random()-.5)*10)
  m.userData.vel=m.position.clone().normalize().multiplyScalar(-0.12)
  meteors.push(m);scene.add(m)
}

/* 🔴 LASER */
const laserGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()])
const laser=new THREE.Line(laserGeo,new THREE.LineBasicMaterial({color:0xff0000}))
scene.add(laser);laser.visible=false

/* ⚡ PLASMA */
const plasma=[]
function plasmaShot(pos){
  for(let i=0;i<20;i++){
    const p=new THREE.Mesh(
      new THREE.SphereGeometry(.04),
      new THREE.MeshBasicMaterial({color:0x00ffff})
    )
    p.position.copy(pos)
    p.userData.vel=new THREE.Vector3(
      (Math.random()-.5)*.2,
      (Math.random()-.5)*.2,
      (Math.random()-.5)*.2
    )
    plasma.push(p);scene.add(p)
  }
}

/* 🎮 INPUT */
addEventListener("pointerdown",e=>{
  if(weapon==="meteor") spawnMeteor()
  if(weapon==="plasma") plasmaShot(sun.position)
})
addEventListener("pointermove",e=>{
  sun.position.x=(e.clientX/innerWidth)*12-6
  sun.position.y=-(e.clientY/innerHeight)*8+4
})

/* 💥 DAMAGE */
function damage(d){
  earthHP=Math.max(0,earthHP-d)
  document.getElementById("hpbar").style.width=earthHP+"%"
  earth.material.emissive.setHex(0x330000)
  if(earthHP<=0){
    earth.material.emissive.setHex(0xff3300)
    earth.scale.multiplyScalar(1.002)
  }
}

/* 🔄 LOOP */
function animate(){
  requestAnimationFrame(animate)
  earth.rotation.y+=.0015
  clouds.rotation.y+=.002

  meteors.forEach((m,i)=>{
    m.position.add(m.userData.vel)
    if(m.position.length()<1){
      damage(5)
      plasmaShot(m.position)
      scene.remove(m);meteors.splice(i,1)
    }
  })

  plasma.forEach((p,i)=>{
    p.position.add(p.userData.vel)
    if(p.position.length()>6){scene.remove(p);plasma.splice(i,1)}
  })

  renderer.render(scene,camera)
}
animate()

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth,innerHeight)
})
</script>
</body>
</html>
