<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EPIC</title>
<style>
html,body{margin:0;overflow:hidden;background:black;touch-action:none}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,2000)
camera.position.z=7

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
renderer.setPixelRatio(devicePixelRatio)
document.body.appendChild(renderer.domElement)

/* 🌌 GWIAZDY */
const starsGeo=new THREE.BufferGeometry()
const starCount=6000
const starPos=[]
for(let i=0;i<starCount;i++){
  starPos.push(
    (Math.random()-0.5)*1500,
    (Math.random()-0.5)*1500,
    (Math.random()-0.5)*1500
  )
}
starsGeo.setAttribute("position",new THREE.Float32BufferAttribute(starPos,3))
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:0.7})))

/* 🌍 ŻYWA ZIEMIA */
const loader=new THREE.TextureLoader()
const earth=new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshStandardMaterial({
    map:loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"),
    emissive:new THREE.Color(0x001133),
    emissiveIntensity:0.4
  })
)
earth.rotation.z=THREE.MathUtils.degToRad(23.44)
scene.add(earth)

/* ☁️ ENERGIA / CHMURY */
const aura=new THREE.Mesh(
  new THREE.SphereGeometry(1.08,64,64),
  new THREE.MeshBasicMaterial({
    color:0x00aaff,
    transparent:true,
    opacity:0.15,
    blending:THREE.AdditiveBlending
  })
)
scene.add(aura)

/* 🌑 PĘKNIĘTA STRONA ZIEMI */
const fracture=new THREE.Mesh(
  new THREE.SphereGeometry(1.01,64,64,0,Math.PI),
  new THREE.MeshStandardMaterial({
    color:0x000000,
    emissive:0xff3300,
    emissiveIntensity:1.2
  })
)
scene.add(fracture)

/* ☀️ SŁOŃCE = GRACZ */
const sun=new THREE.PointLight(0xffeeaa,3,100)
sun.position.set(5,0,5)
scene.add(sun)

/* 🔥 MINI PLANETY / ODŁAMKI */
const shards=[]
for(let i=0;i<40;i++){
  const m=new THREE.Mesh(
    new THREE.IcosahedronGeometry(Math.random()*0.08+0.03),
    new THREE.MeshStandardMaterial({
      color:0xff5500,
      emissive:0xff2200,
      emissiveIntensity:1
    })
  )
  m.userData={
    angle:Math.random()*Math.PI*2,
    radius:Math.random()*4+1.5,
    speed:Math.random()*0.01+0.002
  }
  shards.push(m)
  scene.add(m)
}

/* 🎮 STEROWANIE */
function moveSun(x,y){
  sun.position.x=x*10
  sun.position.y=y*10
}
addEventListener("pointermove",e=>{
  moveSun(
    (e.clientX/innerWidth)*2-1,
    -(e.clientY/innerHeight)*2+1
  )
})

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth,innerHeight)
})

/* 🔄 ANIMACJA */
let t=0
function animate(){
  requestAnimationFrame(animate)
  t+=0.01

  earth.rotation.y+=0.002
  aura.rotation.y-=0.0015
  aura.scale.setScalar(1.05+Math.sin(t)*0.02)

  fracture.rotation.y-=0.002

  shards.forEach(s=>{
    s.userData.angle+=s.userData.speed
    s.position.set(
      Math.cos(s.userData.angle)*s.userData.radius,
      Math.sin(t+s.userData.angle)*0.5,
      Math.sin(s.userData.angle)*s.userData.radius
    )
  })

  renderer.render(scene,camera)
}
animate()
</script>
</body>
</html>
